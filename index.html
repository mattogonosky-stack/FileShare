<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Notepad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0e0f11;--surface:#16181c;--surface2:#1e2127;--surface3:#252830;
    --border:#2a2d35;--border2:#363b45;--accent:#c8f135;--accent2:#4af0b0;
    --accent3:#7c8bff;--muted:#5a5f70;--text:#e8eaf0;--text2:#9098b0;--danger:#ff5a6e;
  }
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
  .app{width:100%;max-width:780px;display:flex;flex-direction:column}
  .topbar{background:var(--surface);border:1px solid var(--border);border-bottom:none;border-radius:16px 16px 0 0;padding:14px 20px;display:flex;align-items:center;gap:12px}
  .logo-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;flex-shrink:0;box-shadow:0 0 10px rgba(200,241,53,0.5)}
  .doc-name-wrap{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
  #docTitle{background:transparent;border:none;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);outline:none;min-width:80px;max-width:260px;cursor:text}
  #docTitle:focus{color:var(--accent)}
  .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .avatar-stack{display:flex}
  .avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--surface);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:-6px;cursor:default;transition:transform 0.15s}
  .avatar:first-child{margin-left:0}.avatar:hover{transform:translateY(-2px);z-index:10}
  .pill-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.15s;white-space:nowrap;background:none}
  .btn-ghost{background:var(--surface2);border-color:var(--border);color:var(--text2)}
  .btn-ghost:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}
  .btn-accent{background:var(--accent);color:#0e0f11;border-color:var(--accent)}
  .btn-accent:hover{background:#d6ff3a}
  .btn-green{background:rgba(74,240,176,0.12);color:var(--accent2);border-color:rgba(74,240,176,0.25)}
  .btn-green:hover{background:rgba(74,240,176,0.2)}
  .toolbar{background:var(--surface);border:1px solid var(--border);border-bottom:none;padding:10px 16px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .tb-sep{width:1px;height:20px;background:var(--border);margin:0 6px;flex-shrink:0}
  .tb-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;transition:all 0.12s}
  .tb-btn:hover{background:var(--surface2);color:var(--text)}
  .tb-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--muted);padding:0 4px}
  .editor-wrap{background:var(--surface);border:1px solid var(--border);border-bottom:none}
  #editor{width:100%;min-height:300px;background:transparent;border:none;outline:none;padding:24px;font-family:'DM Mono',monospace;font-size:13.5px;line-height:1.8;color:var(--text);resize:none}
  #editor::placeholder{color:var(--muted)}
  .bottombar{background:var(--surface);border:1px solid var(--border);border-bottom:none;padding:10px 20px;display:flex;align-items:center;gap:12px}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px rgba(74,240,176,0.5);flex-shrink:0}
  .status-dot.saving{background:var(--accent);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .status-text{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;flex:1}
  .word-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
  .file-panel{background:var(--surface);border:1px solid var(--border);border-radius:0 0 16px 16px;overflow:hidden}
  .file-panel-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px}
  .tab{padding:12px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:6px}
  .tab:hover{color:var(--text2)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab-content{padding:16px 20px;display:none}.tab-content.active{display:block}
  .share-row{display:flex;gap:8px;margin-bottom:16px}
  .link-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center}
  .invite-row{display:flex;gap:8px;margin-bottom:16px}
  .input-field{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Syne',sans-serif;font-size:12px;color:var(--text);outline:none;transition:border-color 0.15s}
  .input-field:focus{border-color:var(--accent)}.input-field::placeholder{color:var(--muted)}
  .role-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-family:'Syne',sans-serif;font-size:12px;color:var(--text2);cursor:pointer;outline:none}
  .people-list{display:flex;flex-direction:column;gap:8px}
  .person-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px}
  .person-avatar{width:28px;height:28px;border-radius:8px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .person-info{flex:1;min-width:0}
  .person-name{font-size:12px;font-weight:600;color:var(--text)}
  .person-email{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
  .role-badge{font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:0.05em;text-transform:uppercase}
  .remove-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;opacity:0;transition:all 0.15s}
  .person-row:hover .remove-btn{opacity:1}.remove-btn:hover{background:rgba(255,90,110,0.15);color:var(--danger)}
  .upload-zone{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:16px;position:relative}
  .upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(200,241,53,0.04)}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .upload-icon{width:40px;height:40px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
  .upload-title{font-size:13px;font-weight:700;margin-bottom:4px}
  .upload-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
  .progress-wrap{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:10px;display:none}
  .progress-bar{height:100%;background:var(--accent);border-radius:1px;transition:width 0.3s ease;width:0%}
  .files-list{display:flex;flex-direction:column;gap:6px}
  .file-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;animation:fadeIn 0.2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .file-ext{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;text-transform:uppercase;flex-shrink:0}
  .file-info{flex:1;min-width:0}
  .file-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .file-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
  .file-actions{display:flex;gap:4px;flex-shrink:0}
  .icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s}
  .icon-btn.dl:hover{color:var(--accent2);border-color:rgba(74,240,176,0.3);background:rgba(74,240,176,0.08)}
  .icon-btn.rm:hover{color:var(--danger);border-color:rgba(255,90,110,0.3);background:rgba(255,90,110,0.08)}
  .export-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .export-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:10px}
  .export-card:hover{border-color:var(--accent);background:rgba(200,241,53,0.04)}
  .export-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .export-label{font-size:12px;font-weight:700;margin-bottom:2px}
  .export-desc{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:12px;font-weight:600;color:var(--text);z-index:999;transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;gap:8px;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2)}
  .file-count-badge{background:var(--accent);color:#0e0f11;border-radius:9px;padding:1px 6px;font-size:10px;margin-left:2px;display:none}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo-dot"></div>
    <div class="doc-name-wrap">
      <input id="docTitle" type="text" value="Untitled Document" spellcheck="false" />
    </div>
    <div class="topbar-right">
      <div class="avatar-stack" id="avatarStack"></div>
      <button class="pill-btn btn-ghost" onclick="openTab('share')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
      <button class="pill-btn btn-accent" onclick="saveNote()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>
  </div>

  <div class="toolbar">
    <span class="tb-label">Format</span>
    <button class="tb-btn" title="Bold" onclick="applyFmt('bold')"><b>B</b></button>
    <button class="tb-btn" title="Italic" onclick="applyFmt('italic')"><i>I</i></button>
    <button class="tb-btn" title="Underline" onclick="applyFmt('underline')"><u>U</u></button>
    <div class="tb-sep"></div>
    <span class="tb-label">Size</span>
    <button class="tb-btn" onclick="changeFontSize(-1)">A-</button>
    <button class="tb-btn" onclick="changeFontSize(1)">A+</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" title="Clear" onclick="clearEditor()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    </button>
    <div class="tb-sep"></div>
    <button class="pill-btn btn-green" onclick="openTab('files')" style="height:30px;padding:0 10px;font-size:11px;">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload
    </button>
    <button class="pill-btn btn-ghost" onclick="openTab('download')" style="height:30px;padding:0 10px;font-size:11px;">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
  </div>

  <div class="editor-wrap">
    <textarea id="editor" placeholder="Start typing your note..." oninput="onEdit()"></textarea>
  </div>

  <div class="bottombar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">All changes saved</span>
    <span class="word-count" id="wordCount">0 words &middot; 0 chars</span>
  </div>

  <div class="file-panel">
    <div class="file-panel-tabs">
      <div class="tab" id="tab-share" onclick="openTab('share')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </div>
      <div class="tab active" id="tab-files" onclick="openTab('files')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Files <span class="file-count-badge" id="fileCountBadge">0</span>
      </div>
      <div class="tab" id="tab-download" onclick="openTab('download')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </div>
    </div>

    <div class="tab-content" id="content-share">
      <div class="share-row">
        <div class="link-box">https://pad.example.com/note/a8f2k9</div>
        <button class="pill-btn btn-ghost" id="copyBtn" onclick="copyLink()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy Link
        </button>
      </div>
      <div class="invite-row">
        <input class="input-field" id="emailInput" type="email" placeholder="Email address..." />
        <select class="role-select" id="roleSelect">
          <option>Editor</option><option>Viewer</option><option>Commenter</option>
        </select>
        <button class="pill-btn btn-accent" onclick="addPerson()">Invite</button>
      </div>
      <div class="people-list" id="peopleList"></div>
    </div>

    <div class="tab-content active" id="content-files">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" multiple onchange="handleFiles(this.files)" />
        <div class="upload-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="upload-title">Drop files here or click to browse</div>
        <div class="upload-sub">Any file type &middot; Up to 25MB each</div>
        <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
      </div>
      <div class="files-list" id="filesList"></div>
    </div>

    <div class="tab-content" id="content-download">
      <div class="export-grid">
        <div class="export-card" onclick="exportAs('txt')">
          <div class="export-icon" style="background:rgba(200,241,53,0.1)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c8f135" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </div>
          <div><div class="export-label">.TXT</div><div class="export-desc">Plain text</div></div>
        </div>
        <div class="export-card" onclick="exportAs('md')">
          <div class="export-icon" style="background:rgba(124,139,255,0.1)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c8bff" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div><div class="export-label">.MD</div><div class="export-desc">Markdown</div></div>
        </div>
        <div class="export-card" onclick="exportAs('html')">
          <div class="export-icon" style="background:rgba(74,240,176,0.1)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4af0b0" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          </div>
          <div><div class="export-label">.HTML</div><div class="export-desc">Web page</div></div>
        </div>
        <div class="export-card" onclick="exportAs('json')">
          <div class="export-icon" style="background:rgba(255,181,71,0.1)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffb547" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          </div>
          <div><div class="export-label">.JSON</div><div class="export-desc">Structured data</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg"></span></div>

<script>
var attachedFiles=[],fontSize=13.5,saveTimer=null,nextId=10;
var people=[
  {id:1,name:'You',email:'me@example.com',role:'Owner',c:'#ffb547',bg:'rgba(255,181,71,0.15)'},
  {id:2,name:'Mia Chen',email:'mia@example.com',role:'Editor',c:'#4af0b0',bg:'rgba(74,240,176,0.12)'},
  {id:3,name:'Jonas K',email:'jonas@example.com',role:'Viewer',c:'#7c8bff',bg:'rgba(124,139,255,0.12)'}
];
var roleColors={
  Owner:{c:'#ffb547',bg:'rgba(255,181,71,0.15)'},
  Editor:{c:'#4af0b0',bg:'rgba(74,240,176,0.12)'},
  Viewer:{c:'#7c8bff',bg:'rgba(124,139,255,0.12)'},
  Commenter:{c:'#d07cf7',bg:'rgba(208,124,247,0.12)'}
};
var extColors={
  pdf:{bg:'rgba(255,90,110,0.12)',c:'#ff5a6e'},
  doc:{bg:'rgba(74,240,176,0.12)',c:'#4af0b0'},
  docx:{bg:'rgba(74,240,176,0.12)',c:'#4af0b0'},
  txt:{bg:'rgba(200,241,53,0.1)',c:'#c8f135'},
  md:{bg:'rgba(124,139,255,0.12)',c:'#7c8bff'},
  png:{bg:'rgba(255,181,71,0.12)',c:'#ffb547'},
  jpg:{bg:'rgba(255,181,71,0.12)',c:'#ffb547'},
  jpeg:{bg:'rgba(255,181,71,0.12)',c:'#ffb547'},
  zip:{bg:'rgba(90,95,112,0.2)',c:'#9098b0'}
};
function initials(n){return n.split(' ').map(function(w){return w[0]}).join('').slice(0,2).toUpperCase()}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';return (b/1048576).toFixed(1)+' MB'}
function getExt(n){return n.split('.').pop().toLowerCase()}
function renderAvatars(){
  document.getElementById('avatarStack').innerHTML=people.slice(0,4).map(function(p){
    return '<div class="avatar" title="'+p.name+'" style="background:'+p.bg+';color:'+p.c+'">'+initials(p.name)+'</div>'
  }).join('')
}
function renderPeople(){
  document.getElementById('peopleList').innerHTML=people.map(function(p){
    var rc=roleColors[p.role]||roleColors.Viewer;
    return '<div class="person-row"><div class="person-avatar" style="background:'+(p.bg||rc.bg)+';color:'+(p.c||rc.c)+'">'+initials(p.name)+'</div><div class="person-info"><div class="person-name">'+p.name+'</div><div class="person-email">'+p.email+'</div></div><span class="role-badge" style="background:'+rc.bg+';color:'+rc.c+'">'+p.role+'</span>'+(p.role!=='Owner'?'<button class="remove-btn" onclick="removePerson('+p.id+')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>':'<div style="width:24px"></div>')+'</div>'
  }).join('')
}
function addPerson(){
  var email=document.getElementById('emailInput').value.trim();
  var role=document.getElementById('roleSelect').value;
  if(!email){showToast('Enter an email');return}
  var name=email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()});
  var rc=roleColors[role];
  people.push({id:nextId++,name:name,email:email,role:role,c:rc.c,bg:rc.bg});
  document.getElementById('emailInput').value='';
  renderPeople();renderAvatars();showToast('Invited '+name+' as '+role)
}
function removePerson(id){
  var idx=people.findIndex(function(p){return p.id===id});
  if(idx>-1){var name=people[idx].name;people.splice(idx,1);renderPeople();renderAvatars();showToast('Removed '+name)}
}
function renderFiles(){
  var badge=document.getElementById('fileCountBadge');
  var list=document.getElementById('filesList');
  if(!attachedFiles.length){list.innerHTML='';badge.style.display='none';return}
  badge.style.display='inline';badge.textContent=attachedFiles.length;
  list.innerHTML=attachedFiles.map(function(f,i){
    var ext=getExt(f.name);
    var ec=extColors[ext]||{bg:'rgba(90,95,112,0.2)',c:'#9098b0'};
    return '<div class="file-row"><div class="file-ext" style="background:'+ec.bg+';color:'+ec.c+'">'+ext+'</div><div class="file-info"><div class="file-name">'+f.name+'</div><div class="file-meta">'+fmtSize(f.size)+' &middot; Added just now</div></div><div class="file-actions"><button class="icon-btn dl" title="Download" onclick="downloadFile('+i+')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button><button class="icon-btn rm" title="Remove" onclick="removeFile('+i+')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div></div>'
  }).join('')
}
function handleFiles(fileList){
  var newFiles=Array.from(fileList);
  if(!newFiles.length)return;
  var pw=document.getElementById('progressWrap'),pb=document.getElementById('progressBar');
  pw.style.display='block';var pct=0;
  function step(){
    pct+=Math.random()*30+10;
    if(pct>=100){pb.style.width='100%';setTimeout(function(){pw.style.display='none';pb.style.width='0%'},400);attachedFiles=attachedFiles.concat(newFiles);renderFiles();showToast(newFiles.length+' file'+(newFiles.length>1?'s':'')+' attached');return}
    pb.style.width=pct+'%';setTimeout(step,120)
  }
  step()
}
function downloadFile(i){
  var f=attachedFiles[i];var url=URL.createObjectURL(f);
  var a=document.createElement('a');a.href=url;a.download=f.name;a.click();URL.revokeObjectURL(url);
  showToast('Downloading '+f.name)
}
function removeFile(i){var name=attachedFiles[i].name;attachedFiles.splice(i,1);renderFiles();showToast('Removed '+name)}
var zone=document.getElementById('uploadZone');
zone.addEventListener('dragover',function(e){e.preventDefault();zone.classList.add('drag-over')});
zone.addEventListener('dragleave',function(){zone.classList.remove('drag-over')});
zone.addEventListener('drop',function(e){e.preventDefault();zone.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});
function exportAs(fmt){
  var title=document.getElementById('docTitle').value||'note';
  var content=document.getElementById('editor').value;
  var blob;
  if(fmt==='txt')blob=new Blob([content],{type:'text/plain'});
  else if(fmt==='md')blob=new Blob([content],{type:'text/markdown'});
  else if(fmt==='html'){var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+title+'</title><style>body{font-family:monospace;max-width:800px;margin:40px auto;padding:20px;white-space:pre-wrap;line-height:1.8}</style></head><body>'+content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</body></html>';blob=new Blob([html],{type:'text/html'})}
  else{var data=JSON.stringify({title:title,content:content,exported:new Date().toISOString()},null,2);blob=new Blob([data],{type:'application/json'})}
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=title.replace(/\s+/g,'_')+'.'+fmt;a.click();URL.revokeObjectURL(url);
  showToast('Exported as .'+fmt.toUpperCase())
}
function applyFmt(cmd){document.execCommand(cmd)}
function changeFontSize(d){fontSize=Math.max(10,Math.min(22,fontSize+d));document.getElementById('editor').style.fontSize=fontSize+'px'}
function clearEditor(){if(!document.getElementById('editor').value)return;document.getElementById('editor').value='';updateWordCount();showToast('Editor cleared')}
function onEdit(){updateWordCount();setStatus('saving');clearTimeout(saveTimer);saveTimer=setTimeout(function(){setStatus('saved')},1200)}
function updateWordCount(){var text=document.getElementById('editor').value;var words=text.trim()?text.trim().split(/\s+/).length:0;document.getElementById('wordCount').textContent=words+' word'+(words!==1?'s':'')+' \u00b7 '+text.length+' chars'}
function setStatus(s){var dot=document.getElementById('statusDot'),txt=document.getElementById('statusText');if(s==='saving'){dot.className='status-dot saving';txt.textContent='Saving...'}else{dot.className='status-dot';txt.textContent='All changes saved'}}
function saveNote(){setStatus('saving');setTimeout(function(){setStatus('saved');showToast('Document saved')},600)}
function openTab(name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('content-'+name).classList.add('active')
}
function copyLink(){
  var btn=document.getElementById('copyBtn');
  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
  setTimeout(function(){btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Link'},2000);
  showToast('Share link copied')
}
var toastTimer;
function showToast(msg){document.getElementById('toastMsg').textContent=msg;document.getElementById('toast').classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){document.getElementById('toast').classList.remove('show')},2500)}
document.getElementById('emailInput').addEventListener('keydown',function(e){if(e.key==='Enter')addPerson()});
renderAvatars();renderPeople();renderFiles();
</script>
</body>
</html>
